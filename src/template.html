<!DOCTYPE html>
<html lang="en">
<head>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gar's Todo-list</title>
</head>
<body>
    <div id="content">
        <header id="header"><p>Testing header</p></header>
        <div id="sidebar">
            <label id="projectsLabelMain" for="addProject">Projects</label>
            <button id="addProject">Press me</button>
            <ul id="projectList">
            </ul>
        </div>
        <div id="hero">
            <div id="listContainer"></div>
        </div>
    </div>
    <form>
        <div>
            <label for="title">Name the task</label>
            <input name="title" id="title" type="text">
        </div>
        <div><textarea id="description" rows="10" cols="30">Describe your task</textarea></div>
        <div>
            <label for="dueDate">Enter when the task is due</label>
            <input name="dueDate" id="dueDate" type="date" value="2026-06-09">
        </div>
        <div>
            <label for="priority">Check if it's a priority task</label>
            <input name="priority" id="priority" type="checkbox">
        </div>
        <button id="submit">Submit</button>
    </form>

</body>
</html>
